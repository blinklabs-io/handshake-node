name: Docker CI

on:
  pull_request:
    branches: ['main']
    paths:
      - '**/*.go'
      - '**/go.*'
      - '.github/workflows/ci-docker.yml'
      - '.github/workflows/publish.yml'
      - 'Dockerfile'
      - 'Makefile'

env:
  GHCR_IMAGE_NAME: ghcr.io/blinklabs-io/handshake-node

permissions:
  contents: read

jobs:
  docker:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: amd64
          - os: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
        with:
          fetch-depth: '0'
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0 https://github.com/docker/setup-buildx-action/releases/tag/v4.2.0
      - id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0 https://github.com/docker/metadata-action/releases/tag/v6.2.0
        with:
          images: ${{ env.GHCR_IMAGE_NAME }}
      - name: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0 https://github.com/docker/build-push-action/releases/tag/v7.3.0
        with:
          context: .
          load: true
          push: false
          platforms: linux/${{ matrix.arch }}
          tags: |
            ${{ steps.meta.outputs.tags }}
            handshake-node:ci-${{ matrix.arch }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ github.ref_type == 'tag' && github.ref_name || '' }}
            COMMIT_HASH=${{ github.sha }}
      - name: scan image
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0 https://github.com/aquasecurity/trivy-action/releases/tag/v0.36.0
        with:
          version: v0.72.0
          image-ref: handshake-node:ci-${{ matrix.arch }}
          scanners: vuln
          severity: HIGH,CRITICAL
          exit-code: '1'
