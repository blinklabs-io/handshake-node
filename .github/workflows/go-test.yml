name: go-test

on:
  push:
    tags:
      - v*
    branches:
      - main
  pull_request:

permissions:
  contents: read

env:
  GO_VERSION: 1.26.x

jobs:
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 https://github.com/actions/setup-go/releases/tag/v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            hnsutil/go.sum
            hnsutil/psbt/go.sum
      - name: build
        run: make build

  unit-cover:
    name: unit-cover
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 https://github.com/actions/setup-go/releases/tag/v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            hnsutil/go.sum
            hnsutil/psbt/go.sum
      - name: test
        run: make unit-cover
      - name: Send top-level coverage
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2 https://github.com/coverallsapp/github-action/releases/tag/v2
        continue-on-error: true
        with:
          file: coverage.txt
          flag-name: handshake-node
          format: golang
          parallel: true
      - name: Send hnsutil coverage
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2 https://github.com/coverallsapp/github-action/releases/tag/v2
        continue-on-error: true
        with:
          file: hnsutil/coverage.txt
          flag-name: hnsutil
          format: golang
          parallel: true
      - name: Notify coveralls all reports sent
        uses: coverallsapp/github-action@5cbfd81b66ca5d10c19b062c04de0199c215fb6e # v2 https://github.com/coverallsapp/github-action/releases/tag/v2
        continue-on-error: true
        with:
          parallel-finished: true

  unit-race:
    name: unit-race
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 https://github.com/actions/setup-go/releases/tag/v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            hnsutil/go.sum
            hnsutil/psbt/go.sum
      - name: test
        run: make unit-race

  rpc-integration:
    name: rpc-integration
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 https://github.com/actions/checkout/releases/tag/v7.0.0
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0 https://github.com/actions/setup-go/releases/tag/v6.5.0
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: |
            go.sum
            hnsutil/go.sum
            hnsutil/psbt/go.sum
      - name: tagged integration tests
        run: make integration
      - name: bounded interoperability protocol tests
        run: make hsd-interop
